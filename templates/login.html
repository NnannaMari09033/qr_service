{% extends "base.html" %}

{% block title %}Login - QR Service{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 4rem auto;" class="fade-in">
    <div class="text-center" style="margin-bottom: 2rem;">
        <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--text);">Welcome back</h1>
        <p style="color: var(--text-secondary); margin-top: 0.4rem;">Log in to manage your QR codes</p>
    </div>
    <div class="card" style="padding: 2rem;">
        <!-- Email/Password Login -->
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Log In</button>
        </form>
    </div>

    <!-- 2FA Verification (hidden by default) -->
    <div id="twofa-section" class="card hidden" style="padding: 2rem; margin-top: 1rem;">
        <div class="text-center" style="margin-bottom: 1rem;">
            <h2 style="font-size: 1.2rem; font-weight: 700; color: var(--text);">Two-Factor Authentication</h2>
            <p style="color: var(--text-secondary); font-size: 0.88rem; margin-top: 0.3rem;">Enter the code from your authenticator app</p>
        </div>
        <form id="twofa-form">
            <div class="form-group">
                <input type="text" id="twofa-code" placeholder="6-digit code" required maxlength="6"
                       pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
                       style="text-align: center; font-size: 1.4rem; letter-spacing: 0.3em; font-weight: 700;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify</button>
        </form>
    </div>

    <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-secondary);">
        Don't have an account? <a href="/register/">Create one</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    let pendingTokens = null;

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.textContent = 'Logging in...';
        btn.disabled = true;

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const resp = await fetch('/auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (resp.ok) {
            const tokens = await resp.json();
            pendingTokens = tokens;

            // Check if user has 2FA enabled
            const profileResp = await fetch('/auth/me/', {
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + tokens.access
                }
            });

            if (profileResp.ok) {
                const profile = await profileResp.json();
                if (profile.has_2fa) {
                    // Show 2FA form
                    document.querySelector('.card').style.display = 'none';
                    document.getElementById('twofa-section').classList.remove('hidden');
                    document.getElementById('twofa-code').focus();
                } else {
                    // No 2FA, go straight to dashboard
                    saveTokens(tokens.access, tokens.refresh);
                    window.location.href = '/dashboard/';
                }
            }
        } else {
            showAlert('Invalid username or password');
            btn.textContent = 'Log In';
            btn.disabled = false;
        }
    });

    document.getElementById('twofa-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = document.getElementById('twofa-code').value;
        const btn = e.target.querySelector('button');
        btn.textContent = 'Verifying...';
        btn.disabled = true;

        const resp = await fetch('/auth/2fa/verify/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + pendingTokens.access
            },
            body: JSON.stringify({ code })
        });

        if (resp.ok) {
            saveTokens(pendingTokens.access, pendingTokens.refresh);
            window.location.href = '/dashboard/';
        } else {
            showAlert('Invalid 2FA code. Please try again.');
            document.getElementById('twofa-code').value = '';
            document.getElementById('twofa-code').focus();
            btn.textContent = 'Verify';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
