{% extends "base.html" %}

{% block title %}Login - QR Service{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 4rem auto;" class="fade-in">
    <div class="text-center" style="margin-bottom: 2rem;">
        <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--text);">Welcome back</h1>
        <p style="color: var(--text-secondary); margin-top: 0.4rem;">Log in to manage your QR codes</p>
    </div>
    <div class="card" style="padding: 2rem;">
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Log In</button>
        </form>
    </div>
    <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-secondary);">
        Don't have an account? <a href="/register/">Create one</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.textContent = 'Logging in...';
        btn.disabled = true;

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const resp = await fetch('/auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (resp.ok) {
            const tokens = await resp.json();
            saveTokens(tokens.access, tokens.refresh);
            window.location.href = '/dashboard/';
        } else {
            showAlert('Invalid username or password');
            btn.textContent = 'Log In';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
