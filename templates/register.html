{% extends "base.html" %}

{% block title %}Register - QR Service{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 3rem auto;" class="fade-in">
    <div class="text-center" style="margin-bottom: 2rem;">
        <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--text);">Create your account</h1>
        <p style="color: var(--text-secondary); margin-top: 0.4rem;">Start generating and tracking QR codes</p>
    </div>
    <div class="card" style="padding: 2rem;">
        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" placeholder="Re-enter your password" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Create Account</button>
        </form>
    </div>
    <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-secondary);">
        Already have an account? <a href="/login/">Log in</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.textContent = 'Creating account...';
        btn.disabled = true;

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (password !== password2) {
            showAlert('Passwords do not match');
            btn.textContent = 'Create Account';
            btn.disabled = false;
            return;
        }

        const resp = await fetch('/auth/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password, password2 })
        });

        if (!resp.ok) {
            const data = await resp.json();
            const errors = Object.values(data).flat().join(', ');
            showAlert(errors);
            btn.textContent = 'Create Account';
            btn.disabled = false;
            return;
        }

        const loginResp = await fetch('/auth/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (loginResp.ok) {
            const tokens = await loginResp.json();
            saveTokens(tokens.access, tokens.refresh);
            window.location.href = '/dashboard/';
        } else {
            showAlert('Account created! Please log in.', 'success');
            setTimeout(() => { window.location.href = '/login/'; }, 1500);
        }
    });
</script>
{% endblock %}
